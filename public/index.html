<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Solva — STEM Solver</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.1/math.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #070d1a;
  --bg2: #0c1428;
  --bg3: #111e36;
  --surface: #162040;
  --surface2: #1d2d52;
  --border: rgba(100,160,255,0.13);
  --border2: rgba(100,160,255,0.25);
  --teal: #00e5c8;
  --teal2: #00b8a0;
  --amber: #ffb830;
  --blue: #4d8eff;
  --text: #e8f0ff;
  --text2: #8ba4d4;
  --text3: #4a6090;
  --danger: #ff5566;
  --success: #4ddb8a;
  --math-color: #00e5c8;
  --physics-color: #4d8eff;
  --chemistry-color: #ff9f40;
  --biology-color: #4ddb8a;
  --statistics-color: #c97fff;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; overflow-x: hidden; }

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(77,142,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(77,142,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

#root { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

/* HEADER */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 60px;
  border-bottom: 1px solid var(--border);
  background: rgba(7,13,26,0.9);
  backdrop-filter: blur(16px);
  position: sticky; top: 0; z-index: 100;
  flex-shrink: 0;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, var(--teal), var(--blue));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; color: #070d1a;
}
.logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
.logo-text span { color: var(--teal); }
.header-right { display: flex; align-items: center; gap: 10px; }
.deg-rad-toggle {
  display: flex; border: 1px solid var(--border2); border-radius: 8px; overflow: hidden;
}
.dr-btn {
  padding: 5px 12px; font-family: 'JetBrains Mono', monospace; font-size: 11px;
  background: transparent; border: none; color: var(--text3); cursor: pointer;
  transition: all 0.15s; letter-spacing: 1px;
}
.dr-btn.active { background: var(--surface2); color: var(--teal); }
.tagline { font-size: 10px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; display: none; }
@media(min-width:600px){ .tagline { display: block; } }

/* SUBJECT TABS */
.subject-bar {
  display: flex; gap: 3px; padding: 14px 24px 0;
  border-bottom: 1px solid var(--border);
  overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
}
.subject-bar::-webkit-scrollbar { display: none; }
.subject-tab {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 10px 10px 0 0;
  font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600;
  cursor: pointer; border: 1px solid transparent; border-bottom: none;
  white-space: nowrap; transition: all 0.18s; color: var(--text2);
  background: transparent; position: relative; bottom: -1px;
}
.subject-tab .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.subject-tab:hover { color: var(--text); background: var(--bg3); }
.subject-tab.active { border-color: var(--border2); background: var(--bg2); color: var(--text); }
.subject-tab[data-subject="Math"] .dot { background: var(--math-color); }
.subject-tab[data-subject="Physics"] .dot { background: var(--physics-color); }
.subject-tab[data-subject="Chemistry"] .dot { background: var(--chemistry-color); }
.subject-tab[data-subject="Biology"] .dot { background: var(--biology-color); }
.subject-tab[data-subject="Statistics"] .dot { background: var(--statistics-color); }

/* LAYOUT */
.app-body {
  flex: 1; display: flex; gap: 0; overflow: hidden;
  min-height: 0;
}
main {
  flex: 1; padding: 22px 24px; display: flex; flex-direction: column;
  gap: 16px; overflow-y: auto; min-width: 0;
}

/* HISTORY SIDEBAR */
.history-panel {
  width: 260px; border-left: 1px solid var(--border);
  background: var(--bg2); display: flex; flex-direction: column;
  flex-shrink: 0; overflow: hidden;
}
@media(max-width: 800px){ .history-panel { display: none; } }
.history-header {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.history-title { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; }
.history-clear { font-size: 10px; color: var(--text3); cursor: pointer; background: none; border: none; font-family: 'JetBrains Mono', monospace; padding: 3px 8px; border-radius: 5px; transition: all 0.15s; }
.history-clear:hover { color: var(--danger); background: rgba(255,85,102,0.08); }
.history-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
.history-list::-webkit-scrollbar { width: 3px; }
.history-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
.history-item {
  padding: 10px 12px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 9px; cursor: pointer; transition: all 0.15s;
}
.history-item:hover { border-color: var(--border2); background: var(--surface2); }
.hi-subject { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
.hi-eq { font-size: 12px; color: var(--text2); word-break: break-all; margin-bottom: 3px; }
.hi-result { font-size: 13px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.hi-time { font-size: 10px; color: var(--text3); margin-top: 4px; }
.history-empty { padding: 24px 16px; text-align: center; font-size: 12px; color: var(--text3); line-height: 1.8; }

/* SUBJECT HEADER */
.subject-header { display: flex; align-items: center; gap: 12px; }
.subject-icon {
  width: 38px; height: 38px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; border: 1px solid var(--border2);
  background: var(--surface); flex-shrink: 0;
}
.subject-name { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
.subject-desc { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* INPUT PANEL */
.input-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.mode-toggle { display: flex; border-bottom: 1px solid var(--border); }
.mode-btn {
  flex: 1; padding: 10px; font-family: 'JetBrains Mono', monospace; font-size: 11px;
  cursor: pointer; background: transparent; border: none; color: var(--text3);
  letter-spacing: 1px; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px;
}
.mode-btn.active { background: var(--surface); color: var(--teal); }
.mode-btn:hover:not(.active) { color: var(--text2); background: var(--bg3); }

/* EQ DISPLAY */
.eq-input-wrap { padding: 12px 14px 0; }
#eq-display {
  min-height: 50px; background: var(--surface); border: 1px solid var(--border2);
  border-radius: 10px; padding: 11px 14px; font-size: 20px; letter-spacing: 1px;
  color: var(--teal); font-family: 'JetBrains Mono', monospace;
  cursor: text; word-break: break-all; line-height: 1.5;
  transition: border-color 0.2s; outline: none;
}
#eq-display:focus { border-color: var(--teal2); }
#eq-display:empty::before { content: attr(data-placeholder); color: var(--text3); font-size: 14px; font-weight: 400; }

/* DRAW / SNAP area */
.visual-input-wrap { padding: 12px 14px 0; display: none; flex-direction: column; gap: 10px; }
.visual-input-wrap.active { display: flex; }
.canvas-container { position: relative; }
#draw-canvas {
  width: 100%; height: 130px; background: var(--surface);
  border: 1px solid var(--border2); border-radius: 10px; cursor: crosshair;
  display: block; touch-action: none;
}
.snap-drop-zone {
  width: 100%; min-height: 130px; background: var(--surface);
  border: 1.5px dashed var(--border2); border-radius: 10px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
}
.snap-drop-zone:hover { border-color: var(--teal2); background: rgba(0,229,200,0.04); }
.snap-drop-zone.drag-over { border-color: var(--teal); background: rgba(0,229,200,0.08); }
.snap-icon { font-size: 28px; }
.snap-label { font-size: 12px; color: var(--text2); text-align: center; line-height: 1.6; }
.snap-sub { font-size: 10px; color: var(--text3); }
#snap-file-input { display: none; }
#snap-preview { width: 100%; border-radius: 10px; display: none; max-height: 200px; object-fit: contain; background: var(--surface); }
.visual-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* KEYBOARD */
.keyboard-wrap { padding: 12px 14px; }
.kb-section { margin-bottom: 9px; }
.kb-label { font-size: 9px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
.kb-row { display: flex; flex-wrap: wrap; gap: 4px; }
.kb-btn {
  padding: 6px 9px; min-width: 34px; border-radius: 7px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px;
  cursor: pointer; transition: all 0.12s; text-align: center; user-select: none;
  white-space: nowrap;
}
.kb-btn:hover { background: var(--surface2); border-color: var(--border2); color: var(--teal); transform: translateY(-1px); }
.kb-btn:active { transform: translateY(0) scale(0.97); }
.kb-btn.accent { border-color: rgba(0,229,200,0.3); color: var(--teal); }
.kb-btn.wide { min-width: 60px; }
.kb-btn.del-btn { color: var(--text2); }
.kb-btn.clear-btn { color: var(--danger); border-color: rgba(255,85,102,0.2); }
.kb-btn.solve-btn {
  background: linear-gradient(135deg, var(--teal), var(--blue));
  color: #070d1a; font-weight: 600; border: none; font-family: 'Syne', sans-serif;
  font-size: 13px; padding: 9px 24px; border-radius: 9px; letter-spacing: 0.5px;
  box-shadow: 0 0 18px rgba(0,229,200,0.2); position: relative; overflow: hidden;
}
.kb-btn.solve-btn:hover { box-shadow: 0 0 28px rgba(0,229,200,0.35); transform: translateY(-1px); }
.kb-btn.solve-btn.loading { pointer-events: none; opacity: 0.7; }
.kb-btn.solve-btn.loading::after {
  content: '';
  position: absolute; top: 50%; left: 50%; width: 16px; height: 16px;
  margin: -8px 0 0 -8px; border: 2px solid rgba(7,13,26,0.3);
  border-top-color: #070d1a; border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.kb-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; flex-wrap: wrap; gap: 8px; }

/* RESULT PANEL */
.result-panel {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px; min-height: 80px;
  transition: border-color 0.3s;
}
.result-panel.has-result { border-color: rgba(0,229,200,0.3); }
.result-panel.has-error { border-color: rgba(255,85,102,0.3); }
.result-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.result-label { font-size: 9px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; }
.copy-btn {
  font-size: 11px; color: var(--text3); background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 3px 10px; cursor: pointer; font-family: 'JetBrains Mono', monospace;
  transition: all 0.15s; display: none;
}
.copy-btn:hover { color: var(--teal); border-color: rgba(0,229,200,0.3); }
.copy-btn.visible { display: inline-flex; align-items: center; gap: 5px; }
.copy-btn.copied { color: var(--success); border-color: rgba(77,219,138,0.3); }
@keyframes glow-in {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}
.result-value {
  font-size: 24px; font-family: 'JetBrains Mono', monospace;
  font-weight: 600; word-break: break-all; line-height: 1.4;
  animation: glow-in 0.25s ease forwards;
}
.result-value.error { color: var(--danger); font-size: 13px; font-weight: 400; }
.result-unit { font-size: 13px; color: var(--text2); margin-left: 6px; font-weight: 400; }
.result-steps { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; }
.step { display: flex; align-items: flex-start; gap: 9px; font-size: 12px; color: var(--text2); padding: 3px 0; }
.step-num {
  min-width: 18px; height: 18px; border-radius: 50%; background: var(--surface);
  border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: var(--text3); flex-shrink: 0; margin-top: 1px;
}
.result-empty { color: var(--text3); font-size: 13px; line-height: 1.8; }
.ai-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; color: var(--teal2); background: rgba(0,229,200,0.08); border: 1px solid rgba(0,229,200,0.2); border-radius: 5px; padding: 2px 8px; margin-bottom: 8px; }

/* EXAMPLES */
.examples-row { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
.examples-label { font-size: 10px; color: var(--text3); letter-spacing: 1px; flex-shrink: 0; }
.example-chip {
  padding: 4px 11px; border-radius: 20px; background: var(--surface);
  border: 1px solid var(--border); font-size: 11px; color: var(--text2);
  cursor: pointer; font-family: 'JetBrains Mono', monospace; transition: all 0.15s;
}
.example-chip:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }

/* TOAST */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); font-size: 13px; padding: 10px 20px; border-radius: 10px;
  transition: transform 0.3s; z-index: 999; white-space: nowrap;
  font-family: 'JetBrains Mono', monospace;
}
#toast.show { transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>
<body>
<div id="root">
  <header>
    <div class="logo">
      <div class="logo-icon">S</div>
      <div>
        <div class="logo-text">Sol<span>va</span></div>
      </div>
    </div>
    <div class="tagline">STEM Problem Solver</div>
    <div class="header-right">
      <div class="deg-rad-toggle">
        <button class="dr-btn active" id="btn-deg" onclick="setAngleMode('deg')">DEG</button>
        <button class="dr-btn" id="btn-rad" onclick="setAngleMode('rad')">RAD</button>
      </div>
    </div>
  </header>

  <div class="subject-bar" id="subject-bar">
    <button class="subject-tab active" data-subject="Math"><span class="dot"></span>Math</button>
    <button class="subject-tab" data-subject="Physics"><span class="dot"></span>Physics</button>
    <button class="subject-tab" data-subject="Chemistry"><span class="dot"></span>Chemistry</button>
    <button class="subject-tab" data-subject="Biology"><span class="dot"></span>Biology</button>
    <button class="subject-tab" data-subject="Statistics"><span class="dot"></span>Statistics</button>
  </div>

  <div class="app-body">
    <main id="main-content"></main>
    <aside class="history-panel">
      <div class="history-header">
        <span class="history-title">History</span>
        <button class="history-clear" id="clear-history-btn">Clear all</button>
      </div>
      <div class="history-list" id="history-list">
        <div class="history-empty">Your solved problems<br>will appear here</div>
      </div>
    </aside>
  </div>
</div>

<div id="toast"></div>
<input type="file" id="snap-file-input" accept="image/*" capture="environment"/>

<script>
// ── STATE ──
const SUBJECTS = {
  Math: {
    icon: '∑', desc: 'Algebra, Calculus, Trigonometry, Number Theory',
    color: '#00e5c8',
    examples: ['2x + 5 = 15', 'sqrt(144)', 'sin(30)', 'log(1000)', 'x^2 - 5x + 6 = 0'],
    keys: {
      Numbers:   ['7','8','9','4','5','6','1','2','3','0','.','(-)'],
      Operators: ['+','-','*','/','^','=','(',')'],
      Functions: ['sqrt(','sin(','cos(','tan(','log(','ln(','abs(','floor(','ceil('],
      Constants: ['pi','e','i','Inf'],
      Calculus:  ['d/dx','∫','lim','Σ'],
    }
  },
  Physics: {
    icon: '⚡', desc: 'Mechanics, Waves, Thermodynamics, Electromagnetism',
    color: '#4d8eff',
    examples: ['9.8 * 5', 'sqrt(2 * 9.8 * 20)', '0.5 * 2 * 10^2', '4 * pi * (0.5)^2', '340 / 440'],
    keys: {
      Numbers:        ['7','8','9','4','5','6','1','2','3','0','.','(-)'],
      Operators:      ['+','-','*','/','^','=','(',')'],
      Functions:      ['sqrt(','sin(','cos(','tan(','abs(','log('],
      Constants:      ['pi','e'],
      'SI Constants': ['g=9.8','c=3e8','h=6.626e-34','k=1.38e-23','R=8.314'],
      Variables:      ['F','m','a','v','u','t','E','P','λ','ω','α','θ','d','r'],
    }
  },
  Chemistry: {
    icon: '⚗', desc: 'Stoichiometry, Thermochemistry, Equilibrium, Gas Laws',
    color: '#ff9f40',
    examples: ['8.314 * 298', '-log(0.001)', '0.5 * 2 / 0.025', '6.022e23 * 1.38e-23', '100 * (18/180)'],
    keys: {
      Numbers:    ['7','8','9','4','5','6','1','2','3','0','.','(-)'],
      Operators:  ['+','-','*','/','^','=','(',')'],
      Functions:  ['log(','ln(','sqrt(','abs(','exp('],
      Constants:  ['R=8.314','NA=6.022e23','h=6.626e-34','k=1.38e-23','F=96485'],
      Symbols:    ['n','m','M','P','V','T','K','pH'],
    }
  },
  Biology: {
    icon: '🧬', desc: 'Genetics, Population Dynamics, Ecology, Physiology',
    color: '#4ddb8a',
    examples: ['1 - 0.16', '(0.84)^2', '1000 * e^(0.05 * 10)', '70 / 1.75^2', 'log(2) / 0.02'],
    keys: {
      Numbers:   ['7','8','9','4','5','6','1','2','3','0','.','(-)'],
      Operators: ['+','-','*','/','^','=','(',')'],
      Functions: ['sqrt(','log(','ln(','exp(','abs('],
      Constants: ['e','pi'],
      Symbols:   ['N','r','K','p','q','t','λ','μ','σ','k'],
    }
  },
  Statistics: {
    icon: '📊', desc: 'Probability, Distributions, Regression, Hypothesis Testing',
    color: '#c97fff',
    examples: ['mean([2,4,6,8,10])', 'std([2,4,4,4,5,5,7,9])', 'factorial(10)', 'combinations(10,3)', 'permutations(8,3)'],
    keys: {
      Numbers:    ['7','8','9','4','5','6','1','2','3','0','.','(-)'],
      Operators:  ['+','-','*','/','^','=','(',')','[',']',','],
      Functions:  ['sqrt(','log(','ln(','exp(','abs(','factorial('],
      'Combinations': ['combinations(','permutations('],
      'Stats Fns': ['mean(','median(','std(','variance(','sum(','max(','min('],
      Constants:  ['pi','e'],
    }
  }
};

let currentSubject = 'Math';
let inputMode = 'keyboard';
let angleMode = 'deg';
let history = JSON.parse(localStorage.getItem('solva_history') || '[]');

// Draw state
let isDrawing = false, lastX = 0, lastY = 0;
// Snap state
let snapImageBase64 = null;

// ── ACCENT ──
function accent() { return SUBJECTS[currentSubject].color; }

// ── ANGLE MODE ──
function setAngleMode(mode) {
  angleMode = mode;
  document.getElementById('btn-deg').classList.toggle('active', mode === 'deg');
  document.getElementById('btn-rad').classList.toggle('active', mode === 'rad');
  showToast(mode === 'deg' ? 'Angle mode: Degrees' : 'Angle mode: Radians');
}

// ── RENDER MAIN ──
function render() {
  const s = SUBJECTS[currentSubject];
  const a = accent();
  document.getElementById('main-content').innerHTML = `
    <div class="subject-header">
      <div class="subject-icon" style="border-color:${a}33;color:${a};background:${a}18">${s.icon}</div>
      <div>
        <div class="subject-name" style="color:${a}">${currentSubject}</div>
        <div class="subject-desc">${s.desc}</div>
      </div>
    </div>

    <div class="input-panel">
      <div class="mode-toggle">
        <button class="mode-btn ${inputMode==='keyboard'?'active':''}" id="mode-kb">⌨ KEYBOARD</button>
        <button class="mode-btn ${inputMode==='draw'?'active':''}" id="mode-draw">✏ DRAW</button>
        <button class="mode-btn ${inputMode==='snap'?'active':''}" id="mode-snap">📷 SNAP</button>
      </div>

      <div class="eq-input-wrap">
        <textarea id="eq-display"
          spellcheck="false"
          placeholder="Enter equation or expression…"
          rows="2"
          ${inputMode==='keyboard' ? '' : 'readonly'}
        ></textarea>
      </div>

      <div class="visual-input-wrap ${inputMode==='draw'?'active':''}" id="draw-wrap">
        <canvas id="draw-canvas" width="900" height="130"></canvas>
        <div class="visual-actions">

function renderKeyboard(keys, a) {
  return Object.entries(keys).map(([label, btns]) => `
    <div class="kb-section">

      <div class="kb-row">
        ${btns.map(b => {
          const isAccent = b.includes('=') && b.length > 2 || ['pi','e','i','Inf','g=9.8','c=3e8'].some(x=>b===x);
          const display = b.endsWith('(') ? b+'…)' : b.includes('=') && b.length>2 ? b.split('=')[0] : b;
          return `<button class="kb-btn${isAccent?' accent':''}" data-insert="${b.replace(/"/g,'&quot;')}">${display}</button>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

// ── ATTACH EVENTS ──
function attachEvents() {
  // mode buttons
  document.getElementById('mode-kb').onclick = () => setMode('keyboard');
  document.getElementById('mode-draw').onclick = () => setMode('draw');
  document.getElementById('mode-snap').onclick = () => setMode('snap');

  // eq-display sync
  const disp = document.getElementById('eq-display');
  disp.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSolve(); } };

  // keyboard buttons
  document.getElementById('keyboard-section').addEventListener('click', e => {
    const btn = e.target.closest('[data-insert]');
    if (btn) kbInsert(btn.dataset.insert);
  });
  document.getElementById('kb-del').onclick = kbBackspace;
  document.getElementById('kb-clear').onclick = kbClear;
  document.getElementById('solve-btn').onclick = doSolve;

  // examples
  document.querySelector('.examples-row').addEventListener('click', e => {
    const chip = e.target.closest('.example-chip');
    if (chip) loadExample(chip.dataset.ex);
  });

  // copy
  document.getElementById('copy-btn').onclick = copyResult;

  // draw
  if (inputMode === 'draw') {
    requestAnimationFrame(() => initDrawCanvas());
    document.getElementById('clear-draw-btn').onclick = clearCanvas;
  }

  // visual footer buttons (draw + snap modes)
  const clear2 = document.getElementById('kb-clear2');
  const solve2 = document.getElementById('solve-btn2');
  if (clear2) clear2.onclick = kbClear;
  if (solve2) solve2.onclick = inputMode === 'draw' ? recogniseDrawing : inputMode === 'snap' ? solveSnap : doSolve;

  // snap
  if (inputMode === 'snap') {
    const snapDrop = document.getElementById('snap-drop');
    const fileInput = document.getElementById('snap-file-input');
    document.getElementById('snap-upload-btn').onclick = () => { fileInput.removeAttribute('capture'); fileInput.click(); };
    document.getElementById('snap-camera-btn').onclick = () => { fileInput.setAttribute('capture','environment'); fileInput.click(); };
    document.getElementById('solve-snap-btn').onclick = solveSnap;
    fileInput.onchange = handleSnapFile;
    snapDrop.onclick = (e) => { if (e.target === snapDrop || e.target.id === 'snap-placeholder' || e.target.closest('#snap-placeholder')) { fileInput.removeAttribute('capture'); fileInput.click(); } };
    snapDrop.ondragover = (e) => { e.preventDefault(); snapDrop.classList.add('drag-over'); };
    snapDrop.ondragleave = () => snapDrop.classList.remove('drag-over');
    snapDrop.ondrop = (e) => { e.preventDefault(); snapDrop.classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if(f) loadSnapFile(f); };
    // restore preview
    if (snapImageBase64) {
      document.getElementById('snap-preview').src = snapImageBase64;
      document.getElementById('snap-preview').style.display = 'block';
      document.getElementById('snap-placeholder').style.display = 'none';
    }
  }

  // history clear
  document.getElementById('clear-history-btn').onclick = clearHistory;
}

function setMode(mode) {
  inputMode = mode;
  // preserve equation text
  const disp = document.getElementById('eq-display');
  const currentEq = disp ? disp.value.trim() : '';
  render();
  if (currentEq) {
    const newDisp = document.getElementById('eq-display');
    if (newDisp) { newDisp.value = currentEq; }
  }
}

// ── KEYBOARD ──
function getEqEl() { return document.getElementById('eq-display'); }

function kbInsert(val) {
  if (inputMode !== 'keyboard') return;
  const el = getEqEl(); if (!el) return; el.focus();
  let insert = val;
  if (val === '(-)') insert = '-';
  else if (val === 'd/dx') insert = 'derivative(';
  else if (val === '∫') insert = 'integrate(';
  else if (val === 'lim') insert = 'lim(';
  else if (val === 'Σ') insert = 'sum(1,n,';
  else if (val.includes('=') && val.length > 2) insert = val.split('=')[1];

  const start = el.selectionStart ?? el.value.length;
  const end = el.selectionEnd ?? el.value.length;
  el.value = el.value.slice(0, start) + insert + el.value.slice(end);
  el.selectionStart = el.selectionEnd = start + insert.length;
}

function kbBackspace() {
  if (inputMode !== 'keyboard') return;
  const el = getEqEl(); if (!el) return; el.focus();
  const start = el.selectionStart;
  const end = el.selectionEnd;
  if (start !== end) {
    el.value = el.value.slice(0, start) + el.value.slice(end);
    el.selectionStart = el.selectionEnd = start;
  } else if (start > 0) {
    el.value = el.value.slice(0, start - 1) + el.value.slice(start);
    el.selectionStart = el.selectionEnd = start - 1;
  }
}

function kbClear() {
  const el = getEqEl();
  if (el) { el.value = ''; el.focus(); }
  snapImageBase64 = null;
  resetResult();
}

function moveCursorToEnd(el) {
  if (!el) return;
  const len = el.value ? el.value.length : 0;
  el.selectionStart = el.selectionEnd = len;
  el.focus();
}

function loadExample(ex) {
  setMode('keyboard');
  setTimeout(() => {
    const el = getEqEl();
    if (el) { el.value = ex; moveCursorToEnd(el); }
    doSolve();
  }, 50);
}

// ── SOLVER ──
function doSolve() {
  const el = getEqEl();
  const raw = (el ? el.value : '').trim();
  if (!raw) return;
  const a = accent();
  const panel = document.getElementById('result-panel');
  const solveBtn = document.getElementById('solve-btn');
  if (solveBtn) { solveBtn.classList.add('loading'); solveBtn.textContent = ''; }

  setTimeout(() => {
    try {
      const { result, steps, unit } = solveExpression(raw);
      panel.className = 'result-panel has-result';
      document.getElementById('result-body').innerHTML = `
        <div class="result-value" style="color:${a}">${result}${unit ? `<span class="result-unit">${unit}</span>` : ''}</div>
        ${steps.length ? `<div class="result-steps">${steps.map(s=>`
          <div class="step"><div class="step-num">${s.n}</div><div>${s.t}</div></div>`).join('')}</div>` : ''}
      `;
      const copyBtn = document.getElementById('copy-btn');
      if (copyBtn) { copyBtn.classList.add('visible'); copyBtn._value = result; }
      addToHistory(raw, result, currentSubject);
    } catch(err) {
      panel.className = 'result-panel has-error';
      document.getElementById('result-body').innerHTML = `
        <div class="result-value error">⚠ ${friendlyError(err.message)}</div>
        <div style="margin-top:8px;font-size:11px;color:var(--text3)">Tip: use * for multiplication, ^ for powers, and close all brackets</div>
      `;
    }
    if (solveBtn) { solveBtn.classList.remove('loading'); solveBtn.textContent = 'Solve →'; }
    // scroll result into view on mobile
    document.getElementById('result-panel')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 20);
}

function solveExpression(raw) {
  const steps = [];
  let unit = '';

  // Normalise input
  let expr = raw
    .replace(/×/g,'*').replace(/÷/g,'/')
    .replace(/π/g,'pi').replace(/√/g,'sqrt')
    .replace(/−/g,'-')
    .replace(/ΔH|dH/g,'dH').replace(/ΔG|dG/g,'dG').replace(/ΔS|dS/g,'dS');

  // Apply degree conversion for trig if DEG mode
  if (angleMode === 'deg') {
    expr = expr.replace(/\b(sin|cos|tan)\(([^)]+)\)/g, (_, fn, arg) => `${fn}((${arg}) * pi / 180)`);
  }

  let result;

  // Equation with = sign
  if (expr.includes('=') && !expr.match(/^(mean|std|variance|median|sum|max|min|sqrt|log|ln|exp|abs|factorial)\(/)) {
    const eqIdx = expr.indexOf('=');
    const lhs = expr.slice(0, eqIdx).trim();
    const rhs = expr.slice(eqIdx + 1).trim();
    steps.push({ n:1, t:`Equation: ${lhs} = ${rhs}` });

    // Find single unknown letter (avoid known constants pi, e, i)
    const vars = [...new Set((raw.match(/\b([a-z])\b/gi) || []).map(v=>v.toLowerCase()))]
      .filter(v => !['pi','e','i','sin','cos','tan','log','abs','exp','ln','sqrt','min','max','std','sum','mean','mod'].includes(v));

    if (vars.length === 1) {
      const v = vars[0];
      steps.push({ n:2, t:`Isolating variable: ${v}` });

      // First try real roots via bisection
      const roots = findRoots(lhs, rhs, v, expr);

      if (roots.length >= 1) {
        result = roots.map((r,i) => roots.length > 1 ? `${v}${subscript(i+1)} = ${formatNum(r)}` : `${v} = ${formatNum(r)}`).join(',  ');
        steps.push({ n:3, t:`${roots.length} real solution${roots.length>1?'s':''} found` });
      } else {
        // No real roots — try quadratic formula for ax^2 + bx + c = 0 form
        const quadratic = solveQuadratic(lhs, rhs, v);
        if (quadratic) {
          result = quadratic.result;
          steps.push({ n:3, t: quadratic.step });
        } else {
          // Try math.js symbolic solve as last resort
          try {
            const sym = math.evaluate(`solve(${lhs} - (${rhs}), ${v})`);
            result = `${v} = ${formatNum(sym)}`;
            steps.push({ n:3, t:'Solved symbolically' });
          } catch {
            result = 'No real solutions';
            steps.push({ n:3, t:'Discriminant < 0 — only complex solutions exist' });
          }
        }
      }
    } else {
      // just evaluate rhs
      result = formatNum(math.evaluate(rhs));
      steps.push({ n:2, t:'Evaluated right-hand side' });
    }
  } else {
    // Pure expression
    steps.push({ n:1, t:'Parsing expression' });
    let evalExpr = preprocessStats(expr);
    const val = math.evaluate(evalExpr);
    result = formatNum(val);
    steps.push({ n:2, t:'Computed result' });
    addContextSteps(raw, steps, val);
    unit = inferUnit(raw);
  }

  return { result, steps, unit };
}

function subscript(n) {
  const sub = ['₁','₂','₃','₄','₅'];
  return sub[n-1] || n;
}

// Quadratic formula solver — handles complex roots
function solveQuadratic(lhs, rhs, v) {
  try {
    // Rearrange to f(x) = lhs - rhs, detect ax^2 + bx + c form
    const f = (x) => {
      const scope = { [v]: x };
      return math.evaluate(lhs, scope) - math.evaluate(rhs, scope);
    };
    // Sample 3 points to extract a, b, c: f(0)=c, f(1)=a+b+c, f(-1)=a-b+c
    const c = f(0);
    const f1 = f(1);
    const fm1 = f(-1);
    const a = (f1 + fm1) / 2 - c;
    const b = (f1 - fm1) / 2;
    // Verify it's truly quadratic (f(2) should match a*4+b*2+c)
    const check = Math.abs(f(2) - (4*a + 2*b + c));
    if (check > 0.01 || Math.abs(a) < 1e-10) return null;
    const disc = b*b - 4*a*c;
    if (disc >= 0) {
      const r1 = (-b + Math.sqrt(disc)) / (2*a);
      const r2 = (-b - Math.sqrt(disc)) / (2*a);
      if (Math.abs(r1 - r2) < 0.001) {
        return { result: `${v} = ${formatNum(r1)}`, step: `One repeated root (discriminant = 0)` };
      }
      return { result: `${v}₁ = ${formatNum(r1)},  ${v}₂ = ${formatNum(r2)}`, step: `Two real roots via quadratic formula` };
    } else {
      // Complex roots
      const realPart = formatNum(-b / (2*a));
      const imagPart = formatNum(Math.sqrt(-disc) / (2*a));
      return {
        result: `${v}₁ = ${realPart} + ${imagPart}i,  ${v}₂ = ${realPart} − ${imagPart}i`,
        step: `Complex roots (discriminant = ${formatNum(disc)} < 0)`
      };
    }
  } catch { return null; }
}

// Multi-root finder: tries bisection across multiple intervals
function findRoots(lhs, rhs, v, fullExpr) {
  const roots = [];
  try {
    const f = (x) => {
      const scope = { [v]: x };
      return math.evaluate(lhs, scope) - math.evaluate(rhs, scope);
    };

    // Scan for sign changes in a reasonable range
    const ranges = [];
    const pts = [];
    for (let x = -200; x <= 200; x += 0.5) pts.push(x);
    for (let i = 0; i < pts.length - 1; i++) {
      try {
        const fa = f(pts[i]), fb = f(pts[i+1]);
        if (isFinite(fa) && isFinite(fb) && fa * fb <= 0) {
          ranges.push([pts[i], pts[i+1]]);
        }
      } catch {}
    }

    for (const [lo, hi] of ranges) {
      const root = bisect(f, lo, hi);
      if (root !== null && !roots.some(r => Math.abs(r - root) < 0.001)) {
        roots.push(root);
      }
    }
  } catch {}
  return roots;
}

function bisect(f, lo, hi, tol=1e-9, maxIter=80) {
  let a = lo, b = hi;
  for (let i = 0; i < maxIter; i++) {
    const mid = (a + b) / 2;
    const fm = f(mid);
    if (Math.abs(fm) < tol || (b - a) < tol) return mid;
    if (f(a) * fm < 0) b = mid; else a = mid;
  }
  const mid = (a + b) / 2;
  return Math.abs(f(mid)) < 0.01 ? mid : null;
}

function preprocessStats(expr) {
  return expr
    .replace(/combinations\((\d+)\s*,\s*(\d+)\)/g, (_, n, k) => String(math.combinations(+n, +k)))
    .replace(/permutations\((\d+)\s*,\s*(\d+)\)/g, (_, n, k) => String(math.permutations(+n, +k)));
}

function addContextSteps(expr, steps, val) {
  if (/\b(sin|cos|tan)\b/.test(expr)) {
    steps.push({ n:3, t: angleMode === 'deg' ? 'Trig evaluated in degree mode' : 'Trig evaluated in radian mode' });
  } else if (/\blog\b/.test(expr) && !/\bln\b/.test(expr)) {
    steps.push({ n:3, t:'log() computes base-10 logarithm' });
  } else if (/factorial/.test(expr)) {
    steps.push({ n:3, t:'n! = product of all integers from 1 to n' });
  } else if (/sqrt/.test(expr)) {
    steps.push({ n:3, t:'sqrt() returns the principal (positive) root' });
  }
}

function inferUnit(expr) {
  if (currentSubject !== 'Physics') return '';
  if (/\*\s*9\.8|\*\s*g\b/.test(expr)) return 'N';
  if (/0\.5\s*\*.*\*\s*v|KE/.test(expr)) return 'J';
  if (/\bm\s*\*\s*[vc]|P\s*=/.test(expr)) return 'kg·m/s';
  return '';
}

function formatNum(val) {
  if (val && typeof val === 'object' && val.re !== undefined) {
    const re = round(val.re), im = round(val.im);
    if (im === 0) return String(re);
    if (re === 0) return `${im}i`;
    return `${re} ${im >= 0 ? '+' : '-'} ${Math.abs(im)}i`;
  }
  if (Array.isArray(val)) return '[' + val.map(formatNum).join(', ') + ']';
  if (typeof val === 'number' || typeof val === 'bigint') {
    const n = Number(val);
    if (!isFinite(n)) return String(n);
    if (Math.abs(n) >= 1e12 || (Math.abs(n) < 1e-5 && n !== 0)) return n.toExponential(4);
    return String(round(n));
  }
  return String(val);
}

function round(n) {
  if (!isFinite(n)) return n;
  if (Number.isInteger(n)) return n;
  return Math.round(n * 1e9) / 1e9;
}

function friendlyError(msg) {
  if (!msg) return 'Unknown error';
  if (/Undefined symbol\s+(.+)/.test(msg)) {
    const sym = msg.match(/Undefined symbol\s+(.+)/)[1];
    return `Unknown variable "${sym}". Define it or check your spelling.`;
  }
  if (/Unexpected|SyntaxError/.test(msg)) return 'Syntax error — check brackets and operators';
  if (/Cannot read|undefined/.test(msg)) return 'Expression could not be parsed';
  return msg;
}

function resetResult() {
  const panel = document.getElementById('result-panel');
  if (!panel) return;
  panel.className = 'result-panel';
  document.getElementById('result-body').innerHTML = `<div class="result-empty">Enter an expression and tap <strong style="color:${accent()}">Solve →</strong></div>`;
  const copyBtn = document.getElementById('copy-btn');
  if (copyBtn) copyBtn.classList.remove('visible');
}

// ── COPY ──
function copyResult() {
  const btn = document.getElementById('copy-btn');
  const val = btn?._value;
  if (!val) return;
  navigator.clipboard.writeText(val).then(() => {
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = '⎘ Copy'; btn.classList.remove('copied'); }, 1800);
  });
}

// ── DRAW MODE ──
function initDrawCanvas() {
  const canvas = document.getElementById('draw-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.strokeStyle = accent();
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  const pos = (e) => {
    const r = canvas.getBoundingClientRect();
    const sx = canvas.width / r.width, sy = canvas.height / r.height;
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left) * sx, y: (src.clientY - r.top) * sy };
  };
  canvas.onpointerdown = (e) => { isDrawing = true; const p = pos(e); lastX = p.x; lastY = p.y; canvas.setPointerCapture(e.pointerId); };
  canvas.onpointermove = (e) => {
    if (!isDrawing) return;
    const p = pos(e);
    ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke();
    lastX = p.x; lastY = p.y;
  };
  canvas.onpointerup = canvas.onpointercancel = () => { isDrawing = false; };
}

function clearCanvas() {
  const canvas = document.getElementById('draw-canvas');
  if (!canvas) return;
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

async function recogniseDrawing() {
  const canvas = document.getElementById('draw-canvas');
  if (!canvas) return;
  // Check canvas has content
  const ctx = canvas.getContext('2d');
  const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
  const hasContent = Array.from(data).some((v, i) => i % 4 === 3 && v > 0);
  if (!hasContent) { showToast('Draw something first!'); return; }

  // Flatten onto white background so Claude receives a visible image
  const exportCanvas = document.createElement('canvas');
  exportCanvas.width = canvas.width; exportCanvas.height = canvas.height;
  const ectx = exportCanvas.getContext('2d');
  ectx.fillStyle = '#162040';
  ectx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
  ectx.drawImage(canvas, 0, 0);
  const b64 = exportCanvas.toDataURL('image/png').split(',')[1];
  await solveWithAI(b64, 'drawn equation');
}

// ── SNAP MODE ──
function handleSnapFile(e) { const f = e.target.files[0]; if (f) loadSnapFile(f); }

function loadSnapFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    snapImageBase64 = e.target.result;
    const preview = document.getElementById('snap-preview');
    const placeholder = document.getElementById('snap-placeholder');
    if (preview) { preview.src = snapImageBase64; preview.style.display = 'block'; }
    if (placeholder) placeholder.style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function solveSnap() {
  if (!snapImageBase64) { showToast('Upload or snap a photo first!'); return; }
  const b64 = snapImageBase64.split(',')[1];
  await solveWithAI(b64, 'photo');
}

// ── CLAUDE API ──
async function solveWithAI(imageBase64, source) {
  const panel = document.getElementById('result-panel');
  const solveBtn = document.getElementById('solve-btn');
  const activeBtn = inputMode === 'snap'
    ? document.getElementById('solve-snap-btn')
    : document.getElementById('solve-btn2');

  panel.className = 'result-panel';
  document.getElementById('result-body').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;color:var(--text2);font-size:13px">
      <div style="width:14px;height:14px;border:2px solid var(--border2);border-top-color:${accent()};border-radius:50%;animation:spin 0.6s linear infinite;flex-shrink:0"></div>
      Analysing ${source} with AI…
    </div>`;

  if (activeBtn) { activeBtn.style.opacity = '0.6'; activeBtn.style.pointerEvents = 'none'; }

  try {
    const prompt = `You are a STEM homework solver specialising in ${currentSubject}. The user has provided an image of a ${source}.

Extract the equation or problem from the image, solve it step by step, and return ONLY a raw JSON object with no markdown formatting, no code blocks, no backticks, no extra text before or after. Just the JSON.

{"extracted":"the equation as text","steps":["step 1","step 2","step 3"],"result":"final answer","unit":"unit or empty string","explanation":"one sentence summary"}`;

    const response = await fetch('/api/proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-3-5-sonnet-20241022',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/png', data: imageBase64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    const data = await response.json();
    // Surface API errors clearly
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    const text = data.content?.find(b => b.type === 'text')?.text || '';

    let parsed;
    try {
      // Try multiple strategies to extract JSON
      let clean = text.trim();
      // Remove markdown code blocks
      clean = clean.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
      // Extract JSON object if surrounded by other text
      const jsonMatch = clean.match(/\{[\s\S]*\}/);
      if (jsonMatch) clean = jsonMatch[0];
      parsed = JSON.parse(clean);
    } catch {
      // Last resort: build a response from the raw text
      parsed = { extracted: text.slice(0, 100) || 'Could not read image', steps: [], result: text.slice(0, 200) || '—', unit: '', explanation: 'AI could not parse the image. Try drawing more clearly or using Snap mode.' };
    }

    // Populate eq-display with extracted equation
    const el = getEqEl();
    if (el && parsed.extracted && parsed.extracted !== 'Could not parse') {
      el.value = parsed.extracted;
    }

    const a = accent();
    panel.className = 'result-panel has-result';
    document.getElementById('result-body').innerHTML = `
      <div class="ai-badge">✦ AI-powered result</div>
      <div class="result-value" style="color:${a}">${parsed.result || '—'}${parsed.unit ? `<span class="result-unit">${parsed.unit}</span>` : ''}</div>
      ${parsed.extracted ? `<div style="font-size:11px;color:var(--text3);margin-top:6px">Extracted: <span style="color:var(--text2)">${parsed.extracted}</span></div>` : ''}
      ${parsed.steps?.length ? `<div class="result-steps">${parsed.steps.map((s,i)=>`
        <div class="step"><div class="step-num">${i+1}</div><div>${s}</div></div>`).join('')}</div>` : ''}
      ${parsed.explanation ? `<div style="font-size:11px;color:var(--text3);margin-top:8px;font-style:italic">${parsed.explanation}</div>` : ''}
    `;

    const copyBtn = document.getElementById('copy-btn');
    if (copyBtn) { copyBtn.classList.add('visible'); copyBtn._value = parsed.result; }

    if (parsed.result && parsed.extracted) {
      addToHistory(parsed.extracted, parsed.result, currentSubject);
    }

  } catch(err) {
    panel.className = 'result-panel has-error';
    document.getElementById('result-body').innerHTML = `
      <div class="result-value error">⚠ AI recognition failed: ${err.message}</div>
      <div style="margin-top:8px;font-size:11px;color:var(--text3)">Check your connection or try the keyboard mode</div>
    `;
  }

  if (activeBtn) { activeBtn.style.opacity = ''; activeBtn.style.pointerEvents = ''; }
}

// ── HISTORY ──
function addToHistory(eq, result, subject) {
  const item = { eq, result, subject, time: Date.now() };
  history.unshift(item);
  if (history.length > 50) history.pop();
  localStorage.setItem('solva_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  if (!list) return;
  if (history.length === 0) {
    list.innerHTML = '<div class="history-empty">Your solved problems<br>will appear here</div>';
    return;
  }
  list.innerHTML = history.slice(0, 30).map((item, idx) => {
    const color = SUBJECTS[item.subject]?.color || '#00e5c8';
    const timeStr = formatTime(item.time);
    return `<div class="history-item" data-idx="${idx}">
      <div class="hi-subject" style="color:${color}">${item.subject}</div>
      <div class="hi-eq">${escHtml(item.eq)}</div>
      <div class="hi-result" style="color:${color}">${escHtml(item.result)}</div>
      <div class="hi-time">${timeStr}</div>
    </div>`;
  }).join('');

  list.querySelectorAll('.history-item').forEach(el => {
    el.onclick = () => {
      const item = history[+el.dataset.idx];
      if (!item) return;
      // Switch subject if needed
      if (item.subject !== currentSubject) {
        currentSubject = item.subject;
        document.querySelectorAll('.subject-tab').forEach(t => {
          t.classList.toggle('active', t.dataset.subject === currentSubject);
        });
      }
      setMode('keyboard');
      setTimeout(() => {
        const el2 = getEqEl();
        if (el2) { el2.value = item.eq; moveCursorToEnd(el2); }
      }, 60);
    };
  });
}

function clearHistory() {
  if (!confirm('Clear all history?')) return;
  history = [];
  localStorage.removeItem('solva_history');
  renderHistory();
}

function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
  return d.toLocaleDateString();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── SUBJECT SWITCHING ──
document.getElementById('subject-bar').addEventListener('click', (e) => {
  const tab = e.target.closest('.subject-tab');
  if (!tab || tab.dataset.subject === currentSubject) return;
  currentSubject = tab.dataset.subject;
  document.querySelectorAll('.subject-tab').forEach(t => t.classList.toggle('active', t === tab));
  const prevEq = getEqEl()?.value?.trim() || '';
  render();
  if (prevEq) {
    const el = getEqEl();
    if (el) { el.value = prevEq; }
  }
});

// ── INIT ──
render();
</script>
